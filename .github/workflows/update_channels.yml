name: Automatic Channel Update

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch: # Allows manual triggering

jobs:
  update-channels:
    runs-on: ubuntu-latest

    permissions:
      contents: write # Required to push changes back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run quality checker
        run: npm run get-qualities channel_data/all_sports_channel.json

      - name: Convert JSON to M3U
        run: npm run json-to-m3u

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add app/data/
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: auto-update channel playlists [skip ci]"
            git push
          fi
